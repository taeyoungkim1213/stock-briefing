name: Daily Stock Briefing

on:
  schedule:
    - cron: '0 22 * * 0-4'   # 평일 22:00 UTC = 한국시간 07:00 (지연 감안 실제 도착 ~08:00)
  workflow_dispatch: {}        # 수동 실행 (테스트용)

permissions:
  contents: read
  secrets: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/main/python/requirements.txt

      - name: Install dependencies
        run: pip install -r src/main/python/requirements.txt

      - name: Run briefing
        working-directory: src/main/python
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: python main.py
